<div class="max-w-5xl mx-auto px-6 py-10">
  <h1 class="text-4xl font-bold mb-10">👤 My Profile</h1>

  <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
    
    <!-- Sidebar -->
    <div class="lg:col-span-4">
      <div class="bg-white rounded-3xl shadow-sm p-8 text-center sticky top-6">
        <div class="w-28 h-28 mx-auto bg-gradient-to-br from-purple-500 to-purple-700 rounded-full flex items-center justify-center text-6xl text-white">
          👤
        </div>
        <h2 class="text-2xl font-bold mt-6">{{ currentUser()?.username }}</h2>
        <p class="text-purple-600">{{ currentUser()?.email }}</p>
      </div>
    </div>

    <!-- Main Content -->
    <div class="lg:col-span-8 space-y-8">
      
      <!-- Edit Profile -->
      <div class="bg-white rounded-3xl shadow-sm p-8">
        <h3 class="text-2xl font-semibold mb-6">Edit Profile</h3>
        
        <div class="space-y-6">
          <div>
            <label class="block text-sm text-gray-500 mb-2">Username</label>
            <input type="text" [(ngModel)]="editData.username" 
                   class="w-full px-5 py-3 border rounded-2xl focus:outline-none focus:border-purple-500">
          </div>
          
          <div>
            <label class="block text-sm text-gray-500 mb-2">Email</label>
            <input type="email" [(ngModel)]="editData.email" 
                   class="w-full px-5 py-3 border rounded-2xl focus:outline-none focus:border-purple-500">
          </div>

          <button (click)="updateProfile()" 
                  class="bg-purple-700 hover:bg-purple-800 text-white px-8 py-3 rounded-2xl font-medium">
            Save Changes
          </button>
        </div>
      </div>

      <!-- Change Password -->
      <div class="bg-white rounded-3xl shadow-sm p-8">
        <h3 class="text-2xl font-semibold mb-6">Change Password</h3>
        
        <div class="space-y-6">
          <div>
            <label class="block text-sm text-gray-500 mb-2">Current Password</label>
            <input type="password" [(ngModel)]="passwordData.currentPassword" 
                   class="w-full px-5 py-3 border rounded-2xl focus:outline-none focus:border-purple-500">
          </div>
          <div>
            <label class="block text-sm text-gray-500 mb-2">New Password</label>
            <input type="password" [(ngModel)]="passwordData.newPassword" 
                   class="w-full px-5 py-3 border rounded-2xl focus:outline-none focus:border-purple-500">
          </div>
          <div>
            <label class="block text-sm text-gray-500 mb-2">Confirm New Password</label>
            <input type="password" [(ngModel)]="passwordData.confirmPassword" 
                   class="w-full px-5 py-3 border rounded-2xl focus:outline-none focus:border-purple-500">
          </div>

          <button (click)="changePassword()" 
                  class="bg-red-600 hover:bg-red-700 text-white px-8 py-3 rounded-2xl font-medium">
            Update Password
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

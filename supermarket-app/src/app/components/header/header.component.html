<header class="bg-purple-700 text-white shadow-lg sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
    
    <!-- Logo -->
    <div class="flex items-center gap-3">
      <span class="text-4xl">🛒</span>
      <h1 class="text-3xl font-bold tracking-tight">SuperMart</h1>
    </div>

    <!-- Search Bar -->
    <div class="flex-1 max-w-2xl mx-12">
      <input 
        type="text" 
        placeholder="Search products, fruits, snacks..." 
        class="w-full px-6 py-4 bg-white text-gray-900 border-2 border-transparent rounded-full focus:outline-none focus:border-purple-300 text-lg placeholder-gray-500">
    </div>

    <!-- Right Side: Navigation + Auth -->
    <div class="flex items-center gap-8">
      <a href="#" class="hover:text-purple-200 transition font-medium">Home</a>
      <a href="#" class="hover:text-purple-200 transition font-medium">Products</a>
      <a href="#" class="hover:text-purple-200 transition font-medium">Deals</a>
      
      <!-- Cart -->
      <button class="flex items-center gap-2 bg-white text-purple-700 hover:bg-purple-100 px-7 py-3 rounded-2xl font-semibold transition">
        🛍️ Cart 
        <span class="ml-1 bg-purple-700 text-white text-sm font-bold px-3 py-1 rounded-full">0</span>
      </button>

      <!-- Login & Register -->
      <div class="flex items-center gap-3">
        <button 
          class="px-6 py-2.5 font-medium hover:bg-purple-600 rounded-xl transition">
          Login
        </button>
        
        <button 
          class="bg-white text-purple-700 hover:bg-purple-100 px-6 py-2.5 font-semibold rounded-xl transition">
          Register
        </button>
      </div>
    </div>
  </div>
</header>

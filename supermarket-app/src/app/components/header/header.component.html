<header class="bg-purple-600 border-b border-gray-200 sticky top-0 z-50">
  <div class="container mx-auto px-4 h-16 flex items-center justify-between gap-4">
    
    <!-- 1. Logo / 專案名稱 -->
    <a routerLink="/products" class="text-xl font-bold text-white flex items-center gap-2 shrink-0">
      🛒 <span class="hidden sm:inline">Supermarket</span>
    </a>

    <!-- 2. ⚙️ 重構核心：中央共享搜尋框（帶有防抖即時建議功能） -->
    <div class="flex-1 max-w-xl relative">
      <div class="flex items-center relative">
        <input 
          type="text" 
          [ngModel]="searchService.searchInputValue()" 
          (ngModelChange)="onSearchInput($event)"
          (keyup.enter)="onSearch()"
          (blur)="onBlur()"
          placeholder="Search products..." 
          class="w-full pl-10 pr-4 py-2 bg-white border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm transition"
        />
        <!-- 放大鏡放大圖標 -->
        <span class="absolute left-3 text-gray-400 text-sm pointer-events-none">🔍</span>
      </div>

      <!-- 💡 下拉即時搜尋建議選單 (Autocomplete Dropdown) -->
      <!-- 使用 Signal 函數式讀取：showSuggestions() 與 hasSuggestions() -->
      <div 
        *ngIf="showSuggestions() && hasSuggestions()" 
        class="absolute left-0 right-0 mt-1 bg-white border border-gray-200 rounded-lg shadow-xl z-50 max-h-60 overflow-y-auto py-1"
      >
        <button 
          *ngFor="let suggestion of suggestions()" 
          (mousedown)="selectSuggestion(suggestion)"
          class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 focus:bg-gray-100 focus:outline-none transition flex items-center gap-2"
        >
          <span class="text-gray-400 text-xs">🕒</span> {{ suggestion }}
        </button>
      </div>
    </div>

    <!-- 3. 右側導航 (購物車、使用者狀態) -->
    <div class="flex items-center gap-4 shrink-0">
      <!-- 購物車按鈕 (帶有數量標籤) -->
      <a routerLink="/cart" class="relative p-2 text-gray-600 hover:text-blue-600 transition">
        <span class="text-xl">🛒</span>
        <!-- 使用 Signal 讀取 totalItems() -->
        <span 
          *ngIf="totalItems() > 0" 
          class="absolute top-0 right-0 bg-red-500 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center font-bold transform translate-x-1 -translate-y-1 animate-pulse"
        >
          {{ totalItems() }}
        </span>
      </a>

      <!-- Auth Section -->
      @if (isLoggedIn()) {
        <!-- 已登入：使用者下拉選單 -->
        <div class="relative">
          <button 
            (click)="toggleDropdown($event)" 
            class="flex items-center gap-1 text-sm font-medium text-gray-700 hover:text-blue-600 focus:outline-none"
          >
            Hi, {{ currentUser()?.username }} 
            <span class="text-xs transition-transform" [class.rotate-180]="isDropdownOpen()">▼</span>
          </button>

          <!-- 下拉選單內容 -->
          <div 
            *ngIf="isDropdownOpen()" 
            (click)="onDropdownClick($event)"
            class="absolute right-0 mt-2 w-48 bg-white border border-gray-200 rounded-lg shadow-lg py-1 z-50 text-sm"
          >
            <a routerLink="/profile" class="block px-4 py-2 text-gray-700 hover:bg-gray-100">個人資料</a>
            <a routerLink="/orders" class="block px-4 py-2 text-gray-700 hover:bg-gray-100">歷史訂單</a>
            <hr class="border-gray-100 my-1">
            <button 
              (click)="logout()" 
              class="w-full text-left px-4 py-2 text-red-600 hover:bg-red-50 transition"
            >
              登出系統
            </button>
          </div>
        </div>
      } @else {
      <!-- 未登入：顯示登入按鈕 -->
      <div class="flex items-center gap-3">
          <a routerLink="/login" 
             class="bg-purple-700 text-white hover:bg-purple-500 px-6 py-2.5 font-semibold rounded-xl transition">
            Login
          </a>
          
          <a routerLink="/register" 
             class="bg-white text-purple-700 hover:bg-purple-100 px-6 py-2.5 font-semibold rounded-xl transition">
            Register
          </a>
        </div>
      }
    </div>

  </div>
</header>

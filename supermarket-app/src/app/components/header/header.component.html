<header class="bg-purple-700 text-white shadow-lg sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
    
    <!-- Logo -->
    <div class="flex items-center gap-3">
      <span class="text-4xl">🛒</span>
      <h1 class="text-3xl font-bold tracking-tight">SuperMart</h1>
    </div>

    <!-- Search Bar -->
    <div class="flex-1 max-w-2xl mx-12">
      <input 
        type="text" 
        placeholder="Search products, fruits, snacks..." 
        class="w-full px-6 py-4 bg-white text-gray-900 border-2 border-transparent rounded-full focus:outline-none focus:border-purple-300 text-lg placeholder-gray-500">
    </div>

    <!-- Right Side -->
<div class="flex items-center gap-6">
  
  <!-- Navigation -->
  <a routerLink="/" class="hover:text-purple-200 transition font-medium">Home</a>
  <a routerLink="/products" class="hover:text-purple-200 transition font-medium">Products</a>

  <!-- Cart -->
  <button routerLink="/cart" 
          class="flex items-center gap-2 bg-white text-purple-700 hover:bg-purple-100 px-7 py-3 rounded-2xl font-semibold transition relative">
    🛍️ Cart
    
    @if (totalItems() > 0) {
      <span class="absolute -top-1 -right-1 bg-red-500 text-white text-xs font-bold w-5 h-5 flex items-center justify-center rounded-full">
        {{ totalItems() }}
      </span>
    }
  </button>

    <!-- Auth Section with Dropdown -->
@if (isLoggedIn()) {
  <div class="relative group">
    <button class="flex items-center gap-3 hover:bg-white/10 px-4 py-2 rounded-2xl transition">
      <div class="w-9 h-9 bg-white/30 rounded-full flex items-center justify-center text-2xl">
        👤
      </div>
      <div class="text-left">
        <span class="text-white font-medium text-sm block">Hi, {{ currentUser()?.username }}</span>
        <span class="text-purple-200 text-xs">{{ currentUser()?.email }}</span>
      </div>
    </button>

    <!-- Dropdown Menu -->
    <div class="absolute right-0 mt-2 w-56 bg-white rounded-2xl shadow-xl py-2 z-50 hidden group-hover:block">
      <a routerLink="/profile" 
         class="flex items-center gap-3 px-5 py-3 hover:bg-gray-100 text-gray-700">
        👤 Profile
      </a>
      <a routerLink="/orders" 
         class="flex items-center gap-3 px-5 py-3 hover:bg-gray-100 text-gray-700">
        📋 My Orders
      </a>
      <div class="border-t my-2"></div>
      <button (click)="logout()" 
              class="flex items-center gap-3 px-5 py-3 hover:bg-red-50 text-red-600 w-full text-left">
        🚪 Logout
      </button>
    </div>
  </div>
    } @else {
      <!-- 未登入 -->
      <div class="flex items-center gap-3">
        <a routerLink="/login" 
          class="px-6 py-2.5 font-medium hover:bg-purple-600 rounded-xl transition text-white">
          Login
        </a>
        <a routerLink="/register" 
          class="bg-white text-purple-700 hover:bg-purple-100 px-6 py-2.5 font-semibold rounded-xl transition">
          Register
        </a>
      </div>
    }
    </div>
  </div>
</header>

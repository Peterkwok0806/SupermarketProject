<div class="max-w-7xl mx-auto px-6 py-10">
  <h2 class="text-3xl font-bold text-center mb-10 text-gray-800">
    🛒 Our Products
  </h2>

  <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
    @for (item of (products$ | async); track item.id) {
      <div class="bg-white rounded-2xl shadow-sm hover:shadow-lg transition overflow-hidden group border border-gray-100">

        <!-- Image -->
        <div class="aspect-square bg-gray-100 relative">
          <img 
            [src]="'/images/products/' + item.photo"
            [alt]="item.name"
            class="w-full h-full object-cover group-hover:scale-105 transition duration-300"
            onerror="this.src='https://picsum.photos/id/237/400/400'; this.onerror=null;"
          />
        </div>

        <!-- Info -->
        <div class="p-5">
          <p class="text-xs text-purple-600 font-medium mb-1">
           {{ item.category | categoryName }}
          </p>
          <h3 class="font-semibold text-lg leading-tight line-clamp-2 h-12">{{ item.name }}</h3>
          
          <div class="mt-3 flex justify-between items-end">
            <div>
              <span class="text-2xl font-bold text-purple-700">
                {{ item.price | currency:'HKD':'symbol-narrow' }}
              </span>
            </div>
          </div>

          <button class="mt-5 w-full bg-purple-700 hover:bg-purple-800 text-white py-3 rounded-2xl font-medium transition">
            Add to Cart
          </button>
        </div>
      </div>
    } @empty {
      <div class="col-span-full py-20 text-center">
        <p class="text-xl text-gray-500">⚠️ 正在載入資料或目前沒有商品...</p>
      </div>
    }
  </div>
</div>

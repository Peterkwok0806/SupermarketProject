<div class="max-w-7xl mx-auto px-6 py-10">
  <h2 class="text-3xl font-bold text-gray-800 mb-8 text-center">🛒 Our Products</h2>

  <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
    
    @for (item of (products$ | async); track item.id) {
      <div class="bg-white rounded-2xl shadow-sm hover:shadow-md transition overflow-hidden group">

        <!-- Product Image -->
        <div class="aspect-square bg-gray-100 relative">
          <img 
            [src]="'images/products/' + item.name + '.jpg'"
            [alt]="item.name"
            class="w-full h-full object-cover group-hover:scale-105 transition duration-300"
            onerror="this.src='https://picsum.photos/id/237/300/300';"
          />
        </div>

        <!-- Product Info -->
        <div class="p-4">
          <h3 class="font-semibold text-lg line-clamp-2 h-14">{{ item.name }}</h3>
          <p class="text-2xl font-bold text-purple-700 mt-2">
            {{ item.price | currency:'HKD':'symbol-narrow':'1.2-2' }}
          </p>
          
          <button class="mt-4 w-full bg-purple-700 hover:bg-purple-800 text-white py-3 rounded-xl font-medium transition">
            Add to Cart
          </button>
        </div>
      </div>
    } @empty {
      <div class="col-span-full text-center py-20">
        <p class="text-xl text-gray-500">⚠️ 正在載入資料或目前沒有商品...</p>
      </div>
    }
  </div>
</div>

<div class="p-8">
  <div class="flex justify-between items-center mb-8">
    <h2 class="text-3xl font-bold">用戶管理</h2>
    <button class="bg-purple-700 hover:bg-purple-800 text-white px-6 py-3 rounded-2xl font-medium">
      + 新增用戶
    </button>
  </div>

  <div class="bg-white rounded-3xl shadow-sm overflow-hidden">
    <table class="w-full">
      <thead class="bg-gray-50">
        <tr>
          <th class="px-6 py-4 text-left">Username</th>
          <th class="px-6 py-4 text-left">Email</th>
          <th class="px-6 py-4 text-left">Role</th>
          <th class="px-6 py-4 text-left">註冊日期</th>
          <th class="px-6 py-4 text-center">狀態</th>
          <th class="px-6 py-4 text-center">操作</th>
        </tr>
      </thead>
      <tbody>
        @for (user of users; track user.id) {
          <tr class="border-t hover:bg-gray-50">
            <td class="px-6 py-5 font-medium">{{ user.username }}</td>
            <td class="px-6 py-5">{{ user.email }}</td>
            <td class="px-6 py-5">
              <span [class]="user.role === 'Admin' ? 'bg-red-100 text-red-700' : 'bg-blue-100 text-blue-700'" 
                    class="px-4 py-1 rounded-full text-sm font-medium">
                {{ user.role }}
              </span>
            </td>
            <td class="px-6 py-5 text-sm text-gray-500">{{ user.createdAt | date:'yyyy-MM-dd' }}</td>
            <td class="px-6 py-5 text-center">
              <span class="px-4 py-1 bg-green-100 text-green-700 rounded-full text-sm">Active</span>
            </td>
            <td class="px-6 py-5 text-center">
              <button (click)="editUser(user)" class="text-blue-600 hover:text-blue-700 mr-4">編輯</button>
              <button (click)="deleteUser(user)" class="text-red-600 hover:text-red-700">刪除</button>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>

<div class="p-8">
  <div class="flex justify-between items-center mb-8">
    <h2 class="text-3xl font-bold">商品管理</h2>
    <button (click)="openAddProductModal()" 
            class="bg-purple-700 hover:bg-purple-800 text-white px-6 py-3 rounded-2xl font-medium flex items-center gap-2">
      + 新增商品
    </button>
  </div>

  <!-- Products Table -->
  <div class="bg-white rounded-3xl shadow-sm overflow-hidden">
    <table class="w-full">
      <thead class="bg-gray-50">
        <tr>
          <th class="px-6 py-4 text-left">商品</th>
          <th class="px-6 py-4 text-right">價格</th>
          <th class="px-6 py-4 text-center">庫存</th>
          <th class="px-6 py-4 text-center">操作</th>
        </tr>
      </thead>
      <tbody>
        @for (product of products(); track product.id) {
          <tr class="border-t hover:bg-gray-50">
            <td class="px-6 py-4">
              <div class="flex items-center gap-4">
                <img [src]="'/images/products/' + product.photo" class="w-12 h-12 object-cover rounded-lg">
                <div>
                  <p class="font-medium">{{ product.name }}</p>
                </div>
              </div>
            </td>
            <td class="px-6 py-4 text-right font-semibold">{{ product.price | currency:'HKD' }}</td>
            <td class="px-6 py-4 text-center">
            </td>
            <td class="px-6 py-4 text-center">
              <button (click)="editProduct(product.id)" class="text-blue-600 hover:text-blue-700 mr-4">編輯</button>
              <button (click)="toggleAvailability(product)" class="text-amber-600 hover:text-amber-700">上下架</button>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>

<!-- 5. 新增：商業標準分頁控制元件 -->
    @if (totalPages() > 1) {
      <div class="flex flex-col items-center justify-center space-y-2 mt-12 border-t border-gray-100 pt-6">
        <div class="flex items-center space-x-4">
          <!-- 上一頁按鈕 (當前是第一頁時自動停用) -->
          <button 
            (click)="prevPage()" 
            [disabled]="currentPage() === 1"
            class="px-5 py-2.5 bg-gray-100 text-gray-700 font-medium rounded-xl disabled:opacity-40 disabled:cursor-not-allowed hover:bg-gray-200 transition">
            ⬅️ Pre
          </button>

          <!-- 頁碼指示器 -->
          <span class="text-gray-700 font-semibold text-sm bg-gray-50 px-4 py-2 rounded-xl border border-gray-200">
             Page{{ currentPage() }} / Total {{ totalPages() }} Page
          </span>

          <!-- 下一頁按鈕 (當前是最後一頁時自動停用) -->
          <button 
            (click)="nextPage()" 
            [disabled]="currentPage() === totalPages()"
            class="px-5 py-2.5 bg-gray-100 text-gray-700 font-medium rounded-xl disabled:opacity-40 disabled:cursor-not-allowed hover:bg-gray-200 transition">
            Next ➡️
          </button>
        </div>
      </div>
    }

    <!-- Product Modal -->
<app-product-modal
  *ngIf="showModal"
  [productId]="selectedProductid"
  (closeModal)="onModalClosed()"
  (saved)="onModalSaved()">
</app-product-modal>

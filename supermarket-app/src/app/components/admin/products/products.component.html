<div class="p-8">
  <div class="flex justify-between items-center mb-8">
    <h2 class="text-3xl font-bold">商品管理</h2>
    <button (click)="openAddProductModal()" 
            class="bg-purple-700 hover:bg-purple-800 text-white px-6 py-3 rounded-2xl font-medium flex items-center gap-2">
      + 新增商品
    </button>
  </div>

  <!-- Products Table -->
  <div class="bg-white rounded-3xl shadow-sm overflow-hidden">
    <table class="w-full">
      <thead class="bg-gray-50">
        <tr>
          <th class="px-6 py-4 text-left">商品</th>
          <th class="px-6 py-4 text-left">分類</th>
          <th class="px-6 py-4 text-right">價格</th>
          <th class="px-6 py-4 text-center">庫存</th>
          <th class="px-6 py-4 text-center">狀態</th>
          <th class="px-6 py-4 text-center">操作</th>
        </tr>
      </thead>
      <tbody>
        @for (product of products; track product.id) {
          <tr class="border-t hover:bg-gray-50">
            <td class="px-6 py-4">
              <div class="flex items-center gap-4">
                <img [src]="'/images/products/' + product.photo" class="w-12 h-12 object-cover rounded-lg">
                <div>
                  <p class="font-medium">{{ product.name }}</p>
                </div>
              </div>
            </td>
            <td class="px-6 py-4">{{ product.category?.name }}</td>
            <td class="px-6 py-4 text-right font-semibold">{{ product.price | currency:'HKD' }}</td>
            <td class="px-6 py-4 text-center">{{ product.stockQuantity }}</td>
            <td class="px-6 py-4 text-center">
              <span [class]="product.isAvailable ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'" 
                    class="px-4 py-1 rounded-full text-sm">
                {{ product.isAvailable ? '上架' : '下架' }}
              </span>
            </td>
            <td class="px-6 py-4 text-center">
              <button (click)="editProduct(product)" class="text-blue-600 hover:text-blue-700 mr-4">編輯</button>
              <button (click)="toggleAvailability(product)" class="text-amber-600 hover:text-amber-700">上下架</button>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>

<div class="min-h-screen bg-gray-50 flex items-center justify-center py-12 px-4">
  <div class="max-w-md w-full bg-white rounded-3xl shadow-xl p-8">
    
    <div class="text-center mb-8">
      <span class="text-5xl">🛒</span>
      <h1 class="text-3xl font-bold text-gray-900 mt-4">Create Account</h1>
      <p class="text-gray-600 mt-2">Join SuperMart today</p>
    </div>

    <form (ngSubmit)="onSubmit()" class="space-y-6">
      
       <!-- Username 欄位 -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Username</label>
        <input type="text" 
               [(ngModel)]="registerData.username"
               name="username"
               required
               class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-purple-500">
      </div>

      <!-- Email 欄位 -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
        <input type="email" 
               [(ngModel)]="registerData.email"
               name="email"
               required
               class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-purple-500">
      </div>

      <!-- Password 欄位 -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
        <input type="password" 
               [(ngModel)]="registerData.password"
               name="password"
               required
               class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-purple-500">
      </div>

      <!-- Confirm Password 欄位 -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Confirm Password</label>
        <input type="password" 
              [(ngModel)]="confirmPassword"
              name="confirmPassword"
              required
              class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-purple-500">
      </div>

       <!-- ✨ 新增：動態錯誤訊息顯示區塊 ✨ -->
      @if (errorMessage) {
        <div class="bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-2xl text-sm flex items-center gap-2">
          <span>⚠️</span>
          <span>{{ errorMessage }}</span>
        </div>
      }

      <button type="submit"
              [disabled]="isLoading()"
              class="w-full bg-purple-700 hover:bg-purple-800 text-white py-4 rounded-2xl font-semibold text-lg transition">
        {{ isLoading()? 'Creating Account...' : 'Register' }}
      </button>
    </form>

    <div class="text-center mt-6">
      <p class="text-gray-600">
        Already have an account? 
        <a routerLink="/login" class="text-purple-700 hover:underline font-medium">Login here</a>
      </p>
    </div>
    @if (showModal) {
  <!-- 利用 Tailwind 任意值：動態直接寫在中括號內 -->
  <div class="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-[fadeIn_0.2s_ease-out_forwards]">
    <div class="bg-white rounded-3xl max-w-sm w-full p-6 text-center shadow-2xl transform transition-all animate-[slideUp_0.2s_ease-out_forwards]">
      <div class="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center text-3xl mx-auto mb-4">
        ✓
      </div>
      <h3 class="text-2xl font-bold text-gray-950 mb-2">註冊成功！</h3>
      <p class="text-gray-600 mb-6">歡迎加入 SuperMart，請前往登入您的帳號。</p>
      <button (click)="closeModalAndNavigate()" 
              class="w-full bg-purple-700 hover:bg-purple-800 text-white font-semibold py-3 rounded-2xl transition shadow-lg shadow-purple-200">
        前往登入
      </button>
    </div>
  </div>
}

  </div>
</div>

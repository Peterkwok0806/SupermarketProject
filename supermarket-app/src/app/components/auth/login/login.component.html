<div class="min-h-screen bg-gray-50 flex items-center justify-center py-12 px-4">
  <div class="max-w-md w-full bg-white rounded-3xl shadow-xl p-8">
    
    <div class="text-center mb-8">
      <span class="text-5xl">🛒</span>
      <h1 class="text-3xl font-bold text-gray-900 mt-4">Welcome Back</h1>
      <p class="text-gray-600 mt-2">Sign in to your account</p>
    </div>

    <form (ngSubmit)="onLogin()" class="space-y-6">
      
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
        <input type="email" 
               [(ngModel)]="loginData.email"
               name="email"
               required
               class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-purple-500">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
        <input type="password" 
               [(ngModel)]="loginData.password"
               name="password"
               required
               class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-purple-500">
      </div>

      <button type="submit"
              [disabled]="isLoading()"
              class="w-full bg-purple-700 hover:bg-purple-800 text-white py-4 rounded-2xl font-semibold text-lg transition">
        {{ isLoading() ? 'Signing in...' : 'Login' }}
      </button>
    </form>

    <div class="text-center mt-6">
      <p class="text-gray-600">
        Don't have an account? 
        <a routerLink="/register" class="text-purple-700 hover:underline font-medium">Register here</a>
      </p>
    </div>
  </div>
</div>
